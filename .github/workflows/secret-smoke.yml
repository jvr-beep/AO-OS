name: Secret Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC

permissions: {}

jobs:
  secret-smoke:
    name: Validate repository secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check all secrets are present
        env:
          AO_PRISMA_KEY: ${{ secrets.AO_PRISMA_KEY }}
          AO_WEB_FRAMER_KEY: ${{ secrets.AO_WEB_FRAMER_KEY }}
          API_KEY_JVR_AOSANCTUARY: ${{ secrets.API_KEY_JVR_AOSANCTUARY }}
          CLAUDE_AO_KEY: ${{ secrets.CLAUDE_AO_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ELEVENLABS_AO_KEY: ${{ secrets.ELEVENLABS_AO_KEY }}
          FIGMA_AO_KEY: ${{ secrets.FIGMA_AO_KEY }}
          FRAMER_API_TOKEN: ${{ secrets.FRAMER_API_TOKEN }}
        run: |
          missing=()
          for secret in \
            AO_PRISMA_KEY \
            AO_WEB_FRAMER_KEY \
            API_KEY_JVR_AOSANCTUARY \
            CLAUDE_AO_KEY \
            CLOUDFLARE_API_TOKEN \
            ELEVENLABS_AO_KEY \
            FIGMA_AO_KEY \
            FRAMER_API_TOKEN; do
            if [ -z "${!secret}" ]; then
              missing+=("$secret")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "❌ Missing secrets: ${missing[*]}"
            echo ""
            echo "Set each missing secret in:"
            echo "  GitHub → Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "See docs/GITHUB_SECRETS_REGISTRY.md for the purpose and source of each secret."
            exit 1
          fi
          echo "✅ All 8 secrets are set"

      - name: Verify CLAUDE_AO_KEY (Anthropic — list models)
        env:
          CLAUDE_AO_KEY: ${{ secrets.CLAUDE_AO_KEY }}
        run: |
          code=$(curl -s -o /tmp/claude.json -w "%{http_code}" \
            -H "x-api-key: ${CLAUDE_AO_KEY}" \
            -H "anthropic-version: 2023-06-01" \
            https://api.anthropic.com/v1/models)
          echo "HTTP $code"
          if [[ "$code" != "200" ]]; then
            echo "❌ CLAUDE_AO_KEY is invalid or expired — HTTP $code"
            cat /tmp/claude.json
            exit 1
          fi
          echo "✅ CLAUDE_AO_KEY is valid"

      - name: Verify CLOUDFLARE_API_TOKEN (token verify endpoint)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/cf.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          echo "HTTP $code"
          if [[ "$code" != "200" ]]; then
            echo "❌ CLOUDFLARE_API_TOKEN is invalid or expired — HTTP $code"
            cat /tmp/cf.json
            exit 1
          fi
          echo "✅ CLOUDFLARE_API_TOKEN is valid"

      - name: Verify ELEVENLABS_AO_KEY (get user info)
        env:
          ELEVENLABS_AO_KEY: ${{ secrets.ELEVENLABS_AO_KEY }}
        run: |
          code=$(curl -s -o /tmp/el.json -w "%{http_code}" \
            -H "xi-api-key: ${ELEVENLABS_AO_KEY}" \
            https://api.elevenlabs.io/v1/user)
          echo "HTTP $code"
          if [[ "$code" != "200" ]]; then
            echo "❌ ELEVENLABS_AO_KEY is invalid or expired — HTTP $code"
            cat /tmp/el.json
            exit 1
          fi
          echo "✅ ELEVENLABS_AO_KEY is valid"

      - name: Verify FIGMA_AO_KEY (get current user)
        env:
          FIGMA_AO_KEY: ${{ secrets.FIGMA_AO_KEY }}
        run: |
          code=$(curl -s -o /tmp/figma.json -w "%{http_code}" \
            -H "X-Figma-Token: ${FIGMA_AO_KEY}" \
            https://api.figma.com/v1/me)
          echo "HTTP $code"
          if [[ "$code" != "200" ]]; then
            echo "❌ FIGMA_AO_KEY is invalid or expired — HTTP $code"
            cat /tmp/figma.json
            exit 1
          fi
          echo "✅ FIGMA_AO_KEY is valid"

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data '{"text":"✅ *Secret Smoke Test passed* — all 8 integration keys are present and valid."}'

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *Secret Smoke Test FAILED* — one or more integration keys are missing or invalid.\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
