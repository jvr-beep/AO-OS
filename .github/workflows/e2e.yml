name: E2E Tests

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ao_os
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ao_os
      AUTH_JWT_SECRET: ci-only-jwt-secret-not-used-in-prod
      AUTH_SEED_ADMIN_EMAIL: ${{ secrets.CI_ADMIN_EMAIL }}
      AUTH_SEED_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
      AUTH_SEED_ADMIN_NAME: CI Admin
      NODE_ENV: test
      # Web runtime env
      SESSION_SECRET: ci-only-session-secret-exactly-32chars
      MEMBER_SESSION_SECRET: ci-only-member-secret-exactly-32chars
      KIOSK_SESSION_SECRET: ci-only-kiosk-secret-exactly-32chars!
      KIOSK_API_SECRET: ci-only-kiosk-api-secret-1234567
      API_BASE_URL: http://localhost:4000/v1
      # E2E
      E2E_BASE_URL: http://localhost:3000
      E2E_API_BASE: http://localhost:4000/v1
      E2E_ADMIN_EMAIL: ${{ secrets.CI_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ao_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          # Use the triggering CI run's exact SHA; fall back to :latest for manual dispatch
          SHA="${{ github.event.workflow_run.head_sha }}"
          if [[ -n "$SHA" ]]; then
            docker pull ghcr.io/jvr-beep/ao-os-api:${SHA}
            docker pull ghcr.io/jvr-beep/ao-os-web:${SHA}
            docker tag ghcr.io/jvr-beep/ao-os-api:${SHA} ao-os-api:ci
            docker tag ghcr.io/jvr-beep/ao-os-web:${SHA} ao-os-web:ci
          else
            docker pull ghcr.io/jvr-beep/ao-os-api:latest
            docker pull ghcr.io/jvr-beep/ao-os-web:latest
            docker tag ghcr.io/jvr-beep/ao-os-api:latest ao-os-api:ci
            docker tag ghcr.io/jvr-beep/ao-os-web:latest ao-os-web:ci
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate --schema prisma/schema.prisma

      - name: Apply migrations
        run: pnpm prisma migrate deploy --schema prisma/schema.prisma

      - name: Seed base data
        run: pnpm prisma db execute --file prisma/seed.sql --schema prisma/schema.prisma

      - name: Start API container
        run: |
          docker run -d --name ao-os-api --network host \
            -e DATABASE_URL="${{ env.DATABASE_URL }}" \
            -e DIRECT_URL="${{ env.DIRECT_URL }}" \
            -e PORT=4000 \
            -e AUTH_JWT_SECRET="${{ env.AUTH_JWT_SECRET }}" \
            -e AUTH_SEED_ADMIN_EMAIL="${{ env.AUTH_SEED_ADMIN_EMAIL }}" \
            -e AUTH_SEED_ADMIN_PASSWORD="${{ env.AUTH_SEED_ADMIN_PASSWORD }}" \
            -e AUTH_SEED_ADMIN_NAME="${{ env.AUTH_SEED_ADMIN_NAME }}" \
            -e KIOSK_API_SECRET="${{ env.KIOSK_API_SECRET }}" \
            -e NODE_ENV=test \
            ao-os-api:ci

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/v1/health >/dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy"
          docker logs ao-os-api
          exit 1

      - name: Start Web container
        run: |
          docker run -d --name ao-os-web --network host \
            -e SESSION_SECRET="${{ env.SESSION_SECRET }}" \
            -e MEMBER_SESSION_SECRET="${{ env.MEMBER_SESSION_SECRET }}" \
            -e KIOSK_SESSION_SECRET="${{ env.KIOSK_SESSION_SECRET }}" \
            -e KIOSK_API_SECRET="${{ env.KIOSK_API_SECRET }}" \
            -e API_BASE_URL="http://localhost:4000/v1" \
            -e NODE_ENV=production \
            ao-os-web:ci

      - name: Wait for web health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/login >/dev/null; then
              echo "Web healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Web did not become healthy"
          docker logs ao-os-web
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @ao-os/web exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter @ao-os/web e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload failure screenshots & traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures
          path: apps/web/test-results/
          retention-days: 7

      - name: Show API log on failure
        if: failure()
        run: docker logs ao-os-api || true

      - name: Show web log on failure
        if: failure()
        run: docker logs ao-os-web || true

      - name: Stop containers
        if: always()
        run: |
          docker rm -f ao-os-api 2>/dev/null || true
          docker rm -f ao-os-web 2>/dev/null || true

      - name: Notify self-heal on failure
        if: failure()
        env:
          AO_OS_SELF_HEAL: ${{ secrets.AO_OS_SELF_HEAL }}
        run: |
          if [[ -z "${AO_OS_SELF_HEAL:-}" ]]; then
            echo "AO_OS_SELF_HEAL not set — skipping"
            exit 0
          fi
          curl -s -X POST "$AO_OS_SELF_HEAL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg owner "${{ github.repository_owner }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg commit_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              '{
                owner: $owner,
                repo: $repo,
                branch: $branch,
                commit_sha: $commit_sha,
                run_id: $run_id,
                service: "web",
                error_type: "e2e_failure",
                error_message: "Playwright E2E tests failed — UI regression detected, see CI artifacts for screenshots and traces",
                file_path: "apps/web/e2e"
              }'
            )" || echo "Self-heal notification failed (non-blocking)"
