name: Inject Resend API Key
on:
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Write key to VM .env and restart API
        uses: appleboy/ssh-action@v1.2.0
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 3m
          command_timeout: 2m
          envs: RESEND_API_KEY
          script: |
            set -e
            ENV_FILE=~/AO-OS/apps/api/.env
            # Remove any existing RESEND_API_KEY line then append the new one
            sed -i '/^RESEND_API_KEY=/d' "$ENV_FILE"
            echo "RESEND_API_KEY=${RESEND_API_KEY}" >> "$ENV_FILE"
            echo "Key written. Restarting API..."
            docker restart ao-os-api
            echo "Waiting for health..."
            sleep 8
            curl -sf http://localhost:4000/v1/health && echo "API healthy"
