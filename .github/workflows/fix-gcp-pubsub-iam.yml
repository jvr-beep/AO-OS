name: Fix GCP Pub/Sub IAM

on:
  workflow_dispatch:

jobs:
  fix-pubsub-iam:
    name: Grant log sink publisher permission on Pub/Sub topic
    runs-on: ubuntu-latest

    steps:
      - name: Fix via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 5m
          command_timeout: 5m
          script: |
            WRITER_IDENTITY="serviceAccount:service-128895821562@gcp-sa-logging.iam.gserviceaccount.com"

            echo "Getting metadata token..."
            TOKEN=$(curl -sf -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
            echo "Token acquired."

            echo "Granting roles/pubsub.publisher to $WRITER_IDENTITY..."
            RESULT=$(curl -s -w "\nHTTP:%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"policy\":{\"bindings\":[{\"role\":\"roles/pubsub.publisher\",\"members\":[\"$WRITER_IDENTITY\"]}]}}" \
              "https://pubsub.googleapis.com/v1/projects/ao-os-vm/topics/logging:setIamPolicy")
            echo "Response: $RESULT"

            HTTP_CODE=$(echo "$RESULT" | tail -1 | tr -d 'HTTP:')
            if [[ "$HTTP_CODE" != "200" ]]; then
              echo "FAILED: HTTP $HTTP_CODE"
              exit 1
            fi
            echo "Done — AO_OS_SINK will now route logs successfully."
