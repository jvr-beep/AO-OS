name: Fix GCP Pub/Sub IAM

on:
  workflow_dispatch:

jobs:
  fix-pubsub-iam:
    name: Grant log sink publisher permission on Pub/Sub topic
    runs-on: ubuntu-latest

    steps:
      - name: Fix via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 5m
          command_timeout: 5m
          script: |
            set -euo pipefail

            echo "=== Getting access token from metadata server ==="
            TOKEN=$(curl -sf -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

            echo "=== Fetching AO_OS_SINK writer identity ==="
            SINK_RESP=$(curl -sf -H "Authorization: Bearer $TOKEN" "https://logging.googleapis.com/v2/projects/ao-os-vm/sinks/AO_OS_SINK")
            WRITER_IDENTITY=$(echo "$SINK_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['writerIdentity'])")

            if [[ -z "$WRITER_IDENTITY" ]]; then
              echo "ERROR: writerIdentity is empty — sink response: $SINK_RESP"
              exit 1
            fi
            echo "Writer identity: $WRITER_IDENTITY"

            echo "=== Setting IAM policy on topic 'logging' ==="
            POLICY_BODY="{\"policy\":{\"bindings\":[{\"role\":\"roles/pubsub.publisher\",\"members\":[\"$WRITER_IDENTITY\"]}]}}"
            RESULT=$(curl -sf -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$POLICY_BODY" \
              "https://pubsub.googleapis.com/v1/projects/ao-os-vm/topics/logging:setIamPolicy")

            echo "Policy applied: $RESULT"
            echo "=== Done — AO_OS_SINK should now route logs to Pub/Sub ==="
