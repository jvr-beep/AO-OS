name: Fix GCP Pub/Sub IAM

on:
  workflow_dispatch:

jobs:
  fix-pubsub-iam:
    name: Grant log sink publisher permission on Pub/Sub topic
    runs-on: ubuntu-latest

    steps:
      - name: Fix via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 5m
          command_timeout: 5m
          script: |
            echo "--- Step 1: Get metadata token ---"
            TOKEN_RESP=$(curl -s -w "\nHTTP:%{http_code}" -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" 2>&1)
            echo "Token response: $TOKEN_RESP"
            TOKEN=$(echo "$TOKEN_RESP" | head -1 | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','MISSING'))" 2>&1 || echo "PARSE_FAILED")
            echo "Token prefix: ${TOKEN:0:20}..."

            echo "--- Step 2: Get sink writer identity ---"
            SINK_RESP=$(curl -s -w "\nHTTP:%{http_code}" -H "Authorization: Bearer $TOKEN" "https://logging.googleapis.com/v2/projects/ao-os-vm/sinks/AO_OS_SINK" 2>&1)
            echo "Sink response: $SINK_RESP"
            WRITER_IDENTITY=$(echo "$SINK_RESP" | head -1 | python3 -c "import sys,json; print(json.load(sys.stdin).get('writerIdentity','MISSING'))" 2>&1 || echo "PARSE_FAILED")
            echo "Writer identity: $WRITER_IDENTITY"

            if [[ "$WRITER_IDENTITY" == "MISSING" || "$WRITER_IDENTITY" == "PARSE_FAILED" || -z "$WRITER_IDENTITY" ]]; then
              echo "ERROR: Could not get writer identity — see output above"
              exit 1
            fi

            echo "--- Step 3: Set Pub/Sub IAM policy ---"
            POLICY_BODY="{\"policy\":{\"bindings\":[{\"role\":\"roles/pubsub.publisher\",\"members\":[\"$WRITER_IDENTITY\"]}]}}"
            RESULT=$(curl -s -w "\nHTTP:%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$POLICY_BODY" \
              "https://pubsub.googleapis.com/v1/projects/ao-os-vm/topics/logging:setIamPolicy" 2>&1)
            echo "setIamPolicy response: $RESULT"

            HTTP_CODE=$(echo "$RESULT" | tail -1 | grep -o '[0-9]*')
            if [[ "$HTTP_CODE" != "200" ]]; then
              echo "ERROR: setIamPolicy returned HTTP $HTTP_CODE"
              exit 1
            fi
            echo "=== Done ==="
