name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      SWAGGERHUB_TOKEN: ${{ secrets.SWAGGERHUB_TOKEN }}

    environment:
      name: production
      url: https://api.aosanctuary.com/v1/health

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 10m
          command_timeout: 10m
          envs: GH_TOKEN,GH_ACTOR,GH_REPOSITORY
          script: |
            set -euo pipefail
            cd ~/AO-OS

            if [ -z "${GH_TOKEN:-}" ]; then
              echo "Missing required secret: GH_TOKEN"
              exit 1
            fi

            NETRC_FILE="$(mktemp)"
            cleanup() {
              rm -f "$NETRC_FILE"
            }
            trap cleanup EXIT

            umask 177
            cat > "$NETRC_FILE" <<EOF
            machine github.com
              login ${GH_ACTOR}
              password ${GH_TOKEN}
            machine api.github.com
              login ${GH_ACTOR}
              password ${GH_TOKEN}
            EOF

            chmod 600 "$NETRC_FILE"
            export NETRC="$NETRC_FILE"

            git remote set-url origin "https://github.com/${GH_REPOSITORY}.git"

            echo "=== Pull latest ==="
            find .git -name "*.lock" -delete 2>/dev/null || true
            git fetch origin
            git pull --ff-only

            echo "=== Deploy ==="
            bash scripts/vm-post-deploy-smoke.sh --build

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OpenAPI in SwaggerHub CLI
        if: ${{ env.SWAGGERHUB_TOKEN != '' }}
        run: pnpm swaggerhub:validate

      - name: Skip SwaggerHub publish (missing token)
        if: ${{ env.SWAGGERHUB_TOKEN == '' }}
        run: echo "SWAGGERHUB_TOKEN is not set; skipping SwaggerHub validation and publish."

      - name: Publish OpenAPI to SwaggerHub
        if: ${{ env.SWAGGERHUB_TOKEN != '' }}
        run: pnpm swaggerhub:push

      - name: Notify on failure
        if: failure()
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          echo "::error::Production deploy failed. Check VM logs: ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} 'docker logs ao-os-api --tail 50'"
          if [[ -z "${N8N_WEBHOOK_URL:-}" ]]; then
            echo "N8N_WEBHOOK_URL not set – skipping n8n deploy-failure notification"
            exit 0
          fi
          if [[ -z "${N8N_API_KEY:-}" ]]; then
            echo "N8N_API_KEY not set – skipping n8n deploy-failure notification"
            exit 0
          fi
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            -d "$(jq -n \
              --arg event "production_deploy_failure" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{event: $event, run_url: $run_url, timestamp: $ts}'
            )" || echo "n8n notification failed (non-blocking)"
