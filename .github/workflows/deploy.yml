name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production
      url: https://api.aosanctuary.com/v1/health

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd ~/AO-OS

            if [ -z "${GH_TOKEN:-}" ]; then
              echo "Missing required secret: GH_TOKEN"
              exit 1
            fi

            NETRC_FILE="$(mktemp)"
            cleanup() {
              rm -f "$NETRC_FILE"
            }
            trap cleanup EXIT

            umask 177
            cat > "$NETRC_FILE" <<EOF
machine github.com
  login ${GH_ACTOR}
  password ${GH_TOKEN}
machine api.github.com
  login ${GH_ACTOR}
  password ${GH_TOKEN}
EOF

            chmod 600 "$NETRC_FILE"
            export NETRC="$NETRC_FILE"

            git remote set-url origin "https://github.com/${GH_REPOSITORY}.git"

            echo "=== Pull latest ==="
            git fetch origin
            git pull --ff-only

            echo "=== Deploy ==="
            bash scripts/vm-post-deploy-smoke.sh --build

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deploy failed. Check VM logs: ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} 'docker logs ao-os-api --tail 50'"
