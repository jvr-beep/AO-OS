name: Datadog — Deploy Agent & Inject Key

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/src/tracing.ts"
      - ".github/workflows/datadog-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Inject DD_API_KEY into API .env
        run: |
          ssh jvr@${{ secrets.VM_HOST }} \
            "sed -i 's/^DD_API_KEY=.*/DD_API_KEY=${{ secrets.AO_DATA_DOG_KEY }}/' ~/AO-OS/apps/api/.env"

      - name: Start Datadog Agent (idempotent)
        run: |
          ssh jvr@${{ secrets.VM_HOST }} << 'SSHEOF'
            if docker ps -a --format '{{.Names}}' | grep -q '^datadog-agent$'; then
              docker stop datadog-agent || true
              docker rm datadog-agent || true
            fi
            docker run -d \
              --name datadog-agent \
              --restart unless-stopped \
              -e DD_API_KEY=${{ secrets.AO_DATA_DOG_KEY }} \
              -e DD_SITE=datadoghq.com \
              -e DD_HOSTNAME=ao-os-production \
              -e DD_LOGS_ENABLED=true \
              -e DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true \
              -e DD_APM_ENABLED=true \
              -e DD_APM_NON_LOCAL_TRAFFIC=true \
              -e DD_PROCESS_AGENT_ENABLED=true \
              -p 8126:8126/tcp \
              -p 8125:8125/udp \
              -v /var/run/docker.sock:/var/run/docker.sock:ro \
              -v /proc/:/host/proc/:ro \
              -v /sys/fs/cgroup/:/host/sys/fs/cgroup:ro \
              -v /var/lib/docker/containers:/var/lib/docker/containers:ro \
              gcr.io/datadoghq/agent:7
          SSHEOF

      - name: Rebuild and restart API container
        run: |
          ssh jvr@${{ secrets.VM_HOST }} << 'SSHEOF'
            cd ~/AO-OS
            docker build -f apps/api/Dockerfile -t docker-api . 2>&1 | tail -5
            docker stop ao-os-api && docker rm ao-os-api
            docker run -d \
              --name ao-os-api \
              --restart unless-stopped \
              --add-host host.docker.internal:host-gateway \
              --env-file ~/AO-OS/apps/api/.env \
              -p 4000:4000 \
              docker-api
          SSHEOF

      - name: Verify agent health
        run: |
          sleep 30
          ssh jvr@${{ secrets.VM_HOST }} \
            "docker exec datadog-agent agent status 2>&1 | grep -E 'API Key|APM|Logs|Forwarder' | head -10"
