name: Upgrade 3F Floor Map
on:
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Run 3F upgrade on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 5m
          command_timeout: 5m
          script: |
            set -e
            cd ~/AO-OS
            git pull origin main
            docker cp scripts/upgrade-3f-floor-map.mjs ao-os-api:/app/scripts/upgrade-3f-floor-map.mjs
            docker cp scripts/3rd-floor-v2.svg ao-os-api:/app/scripts/3rd-floor-v2.svg
            docker exec ao-os-api node /app/scripts/upgrade-3f-floor-map.mjs
