name: Seed Map Objects
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Run MapObject seed on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 5m
          command_timeout: 5m
          script: |
            set -e
            cd ~/AO-OS
            git pull origin main
            docker cp scripts/seed-map-objects.mjs ao-os-api:/app/scripts/seed-map-objects.mjs
            docker exec ao-os-api node /app/scripts/seed-map-objects.mjs
