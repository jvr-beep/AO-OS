name: OpenAPI Validate

on:
  push:
    paths:
      - 'openapi/**'
  pull_request:
    paths:
      - 'openapi/**'

jobs:
  validate:
    name: Lint OpenAPI spec
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate OpenAPI spec
        run: |
          npx --yes @stoplight/spectral-cli@6 lint openapi/ao-os.openapi.yaml \
            --ruleset https://unpkg.com/@stoplight/spectral-openapi/dist/ruleset.mjs \
            --fail-severity warn
