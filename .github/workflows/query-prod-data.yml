name: Query Prod Data
on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: Query rooms, lockers, zones, and map floors
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 3m
          command_timeout: 3m
          script: |
            docker exec ao-os-api node -e "
            const { PrismaClient } = require('@prisma/client');
            const p = new PrismaClient();
            async function run() {
              const [rooms, zones, floors, lockers] = await Promise.all([
                p.room.findMany({ select: { id:true, code:true, name:true, roomType:true, status:true }, orderBy: { code: 'asc' } }),
                p.accessZone.findMany({ select: { id:true, code:true, name:true }, orderBy: { code: 'asc' } }),
                p.mapFloor.findMany({ select: { id:true, name:true, level:true }, orderBy: { level: 'asc' } }),
                p.locker.findMany({ select: { id:true, code:true, status:true }, orderBy: { code: 'asc' }, take: 5 }),
              ]);
              console.log('=ROOMS=');
              rooms.forEach(r => console.log(r.id, r.code, r.name, r.roomType, r.status));
              console.log('=ZONES=');
              zones.forEach(z => console.log(z.id, z.code, z.name));
              console.log('=FLOORS=');
              floors.forEach(f => console.log(f.id, f.name, 'level', f.level));
              console.log('=LOCKERS_SAMPLE=');
              lockers.forEach(l => console.log(l.id, l.code, l.status));
            }
            run().catch(e => { console.error(e); process.exit(1); }).finally(() => p.\$disconnect());
            "
