name: Seed Floor Maps
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Run seed script on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 5m
          command_timeout: 5m
          script: |
            set -e
            cd ~/AO-OS
            git pull origin main
            # Copy seed script and SVG assets into the running container
            docker exec ao-os-api mkdir -p /app/scripts/floor-plans
            docker cp scripts/seed-floor-maps.mjs ao-os-api:/app/scripts/seed-floor-maps.mjs
            docker cp scripts/floor-plans/main-floor.svg ao-os-api:/app/scripts/floor-plans/main-floor.svg
            docker cp scripts/floor-plans/2nd-floor.svg ao-os-api:/app/scripts/floor-plans/2nd-floor.svg
            docker cp scripts/floor-plans/3rd-floor.svg ao-os-api:/app/scripts/floor-plans/3rd-floor.svg
            docker exec ao-os-api node /app/scripts/seed-floor-maps.mjs
