name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate --schema prisma/schema.prisma

      - name: Typecheck API
        run: pnpm --filter api run typecheck

      - name: Notify self-heal on failure
        if: failure()
        env:
          AO_OS_SELF_HEAL: ${{ secrets.AO_OS_SELF_HEAL }}
        run: |
          if [[ -z "${AO_OS_SELF_HEAL:-}" ]]; then
            echo "AO_OS_SELF_HEAL not set — skipping"
            exit 0
          fi
          changed_file=$(git diff --name-only HEAD~1 2>/dev/null | grep '\.ts$' | head -1 || echo "apps/api/src/index.ts")
          curl -s -X POST "$AO_OS_SELF_HEAL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg owner "${{ github.repository_owner }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg commit_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              --arg file_path "$changed_file" \
              '{
                owner: $owner,
                repo: $repo,
                branch: $branch,
                commit_sha: $commit_sha,
                run_id: $run_id,
                service: "api",
                error_type: "typecheck_failure",
                error_message: "TypeScript typecheck failed — see CI run for details",
                file_path: $file_path
              }'
            )" || echo "Self-heal notification failed (non-blocking)"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ao_os
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ao_os
      PORT: 4000
      AUTH_JWT_SECRET: ci-only-jwt-secret-not-used-in-prod
      AUTH_SEED_ADMIN_EMAIL: admin@ao-os.dev
      AUTH_SEED_ADMIN_PASSWORD: CiTestPass123!
      AUTH_SEED_ADMIN_NAME: CI Admin
      NODE_ENV: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ao_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate --schema prisma/schema.prisma

      - name: Apply migrations
        run: pnpm prisma migrate deploy --schema prisma/schema.prisma

      - name: Run integration tests
        run: pnpm --filter api run test:int

      - name: Notify self-heal on failure
        if: failure()
        env:
          AO_OS_SELF_HEAL: ${{ secrets.AO_OS_SELF_HEAL }}
        run: |
          if [[ -z "${AO_OS_SELF_HEAL:-}" ]]; then
            echo "AO_OS_SELF_HEAL not set — skipping"
            exit 0
          fi
          changed_file=$(git diff --name-only HEAD~1 2>/dev/null | grep '\.ts$' | head -1 || echo "apps/api/src/index.ts")
          curl -s -X POST "$AO_OS_SELF_HEAL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg owner "${{ github.repository_owner }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg commit_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              --arg file_path "$changed_file" \
              '{
                owner: $owner,
                repo: $repo,
                branch: $branch,
                commit_sha: $commit_sha,
                run_id: $run_id,
                service: "api",
                error_type: "integration_test_failure",
                error_message: "Integration tests failed — see CI run for details",
                file_path: $file_path
              }'
            )" || echo "Self-heal notification failed (non-blocking)"

  build-api:
    name: Build & Push API image
    runs-on: ubuntu-latest
    needs: [typecheck, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/jvr-beep/ao-os-api:latest
            ghcr.io/jvr-beep/ao-os-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Notify self-heal on failure
        if: failure()
        env:
          AO_OS_SELF_HEAL: ${{ secrets.AO_OS_SELF_HEAL }}
        run: |
          if [[ -z "${AO_OS_SELF_HEAL:-}" ]]; then
            echo "AO_OS_SELF_HEAL not set — skipping"
            exit 0
          fi
          curl -s -X POST "$AO_OS_SELF_HEAL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg owner "${{ github.repository_owner }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg commit_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              '{
                owner: $owner,
                repo: $repo,
                branch: $branch,
                commit_sha: $commit_sha,
                run_id: $run_id,
                service: "api",
                error_type: "docker_build_failure",
                error_message: "API Docker build failed — see CI run for details",
                file_path: "apps/api/Dockerfile"
              }'
            )" || echo "Self-heal notification failed (non-blocking)"

  build-web:
    name: Build & Push Web image
    runs-on: ubuntu-latest
    needs: [typecheck, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/jvr-beep/ao-os-web:latest
            ghcr.io/jvr-beep/ao-os-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Notify self-heal on failure
        if: failure()
        env:
          AO_OS_SELF_HEAL: ${{ secrets.AO_OS_SELF_HEAL }}
        run: |
          if [[ -z "${AO_OS_SELF_HEAL:-}" ]]; then
            echo "AO_OS_SELF_HEAL not set — skipping"
            exit 0
          fi
          curl -s -X POST "$AO_OS_SELF_HEAL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg owner "${{ github.repository_owner }}" \
              --arg repo "${{ github.event.repository.name }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg commit_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              '{
                owner: $owner,
                repo: $repo,
                branch: $branch,
                commit_sha: $commit_sha,
                run_id: $run_id,
                service: "web",
                error_type: "docker_build_failure",
                error_message: "Web Docker build failed — see CI run for details",
                file_path: "apps/web/Dockerfile"
              }'
            )" || echo "Self-heal notification failed (non-blocking)"
