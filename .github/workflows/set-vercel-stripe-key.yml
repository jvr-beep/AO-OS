name: Set Stripe publishable key in Vercel
on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Add NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY to Vercel
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.vercel.com/v10/projects/prj_6IlYeR5DySHmvLIoWIGFbuhzPxSh/env?teamId=team_iuQ1aHpcZbVJQES1EQzvKKqr" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-raw "{\"key\":\"NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY\",\"value\":\"${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}")
          echo "$RESPONSE" | grep -v HTTP_STATUS | jq .
          echo "$RESPONSE" | grep HTTP_STATUS
