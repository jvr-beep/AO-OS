services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: ao-os-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../../apps/api/.env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        # SESSION_SECRET and NEXT_PUBLIC_* are baked in at build time by Next.js.
        # The deploy script reads these from apps/web/.env before building.
        SESSION_SECRET: ${SESSION_SECRET:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    container_name: ao-os-web
    restart: unless-stopped
    env_file:
      - ../../apps/web/.env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
