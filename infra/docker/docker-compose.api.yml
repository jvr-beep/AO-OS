services:
  api:
    image: ghcr.io/jvr-beep/ao-os-api:latest
    container_name: ao-os-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../../apps/api/.env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: ghcr.io/jvr-beep/ao-os-web:latest
    container_name: ao-os-web
    restart: unless-stopped
    env_file:
      - ../../apps/web/.env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
